<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock the Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lock-screen">
        <div class="lock-vignette"></div> <div class="glass-numpad-container">
            <h2 class="numpad-title">ENTER KEY</h2>
            
            <div class="numpad-grid">
                <button class="glass-btn" onclick="addDigit('1')" data-num="1">1</button>
                <button class="glass-btn" onclick="addDigit('2')" data-num="2">2</button>
                <button class="glass-btn" onclick="addDigit('3')" data-num="3">3</button>
                
                <button class="glass-btn" onclick="addDigit('4')" data-num="4">4</button>
                <button class="glass-btn" onclick="addDigit('5')" data-num="5">5</button>
                <button class="glass-btn" onclick="addDigit('6')" data-num="6">6</button>
                
                <button class="glass-btn" onclick="addDigit('7')" data-num="7">7</button>
                <button class="glass-btn" onclick="addDigit('8')" data-num="8">8</button>
                <button class="glass-btn" onclick="addDigit('9')" data-num="9">9</button>
                
                <div class="empty-space"></div> <button class="glass-btn" onclick="addDigit('0')" data-num="0">0</button>
                <button class="glass-btn clear-btn" onclick="resetInput()">C</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="fade-in-hidden">
        
        <header class="top-pink-ui">
            <h1>PRIVATE VIEWING</h1>
        </header>

        <main class="player-container">
            <div class="video-glass-card">
                <div class="video-wrapper">
                    <video id="protected-video" controls>
                        <source src="video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <p class="video-subtext">Authorized Streaming Only</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
