<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Widescreen Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-widescreen-container">
        
        <div id="password-screen">
            <div class="glass-pin-card">
                <h2 class="prompt-text">SECURE ACCESS</h2>
                <div class="pin-display">
                    <span id="pin-placeholder" class="dot-empty"></span>
                    <span id="pin-placeholder" class="dot-empty"></span>
                    <span id="pin-placeholder" class="dot-empty"></span>
                    <span id="pin-placeholder" class="dot-empty"></span>
                </div>
                <div class="numpad">
                    <button class="num-btn glass" onclick="inputDigit('1')">1</button>
                    <button class="num-btn glass" onclick="inputDigit('2')">2</button>
                    <button class="num-btn glass" onclick="inputDigit('3')">3</button>
                    <button class="num-btn glass" onclick="inputDigit('4')">4</button>
                    <button class="num-btn glass" onclick="inputDigit('5')">5</button>
                    <button class="num-btn glass" onclick="inputDigit('6')">6</button>
                    <button class="num-btn glass" onclick="inputDigit('7')">7</button>
                    <button class="num-btn glass" onclick="inputDigit('8')">8</button>
                    <button class="num-btn glass" onclick="inputDigit('9')">9</button>
                    <button class="num-btn glass action-btn" onclick="clearInput()">C</button>
                    <button class="num-btn glass" onclick="inputDigit('0')">0</button>
                    <button class="num-btn glass action-btn" onclick="verifyPassword()">✓</button>
                </div>
            </div>
        </div>

        <div id="main-content" class="hidden">
            <div class="glass-video-card">
                <h1 class="main-title">NOW PLAYING: FUN VIDEO</h1>
                <div class="media-wrapper">
                    <video id="main-video" controls>
                        <source src="video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
